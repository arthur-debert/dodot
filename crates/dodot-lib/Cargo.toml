[package]
name = "dodot-lib"
version = "0.1.0"
edition = "2021"
description = "Core library for dodot dotfiles manager"

[dependencies]
clapfig = "0.15"
confique = "0.4"
glob = "0.3"
serde = { version = "1", features = ["derive"] }
tempfile = { version = "3", optional = true }
thiserror = "2"
toml = "0.8"

[dev-dependencies]
serde_json = "1"
tempfile = "3"

[features]
default = []
test-utils = ["tempfile"]
