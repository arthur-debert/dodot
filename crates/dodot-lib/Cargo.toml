[package]
name = "dodot-lib"
version = "0.1.0"
edition = "2021"
description = "Core library for dodot dotfiles manager"

[dependencies]
serde = { version = "1", features = ["derive"] }
tempfile = { version = "3", optional = true }
thiserror = "2"

[dev-dependencies]
serde_json = "1"
tempfile = "3"

[features]
default = []
test-utils = ["tempfile"]
