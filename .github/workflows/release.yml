name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' crates/dodot-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    needs: create-release
    if: always() && !failure() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dodot-aarch64-apple-darwin
            cross: false
            sign: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dodot-x86_64-linux-gnu
            cross: false
            sign: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dodot-aarch64-linux-gnu
            cross: true
            sign: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if asset already exists
        id: check_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.create-release.outputs.version }}"
          ASSET="${{ matrix.artifact }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Asset $ASSET already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust
        if: steps.check_asset.outputs.exists != 'true'
        uses: ./.github/actions/rust-setup
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross && steps.check_asset.outputs.exists != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross --force

      - name: Build binary
        id: build
        if: steps.check_asset.outputs.exists != 'true'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p dodot
          else
            cargo build --release --target ${{ matrix.target }} -p dodot
          fi

      # macOS code signing
      - name: Import signing certificate
        if: matrix.sign && steps.check_asset.outputs.exists != 'true'
        continue-on-error: true
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::warning::No signing certificate configured, skipping code signing"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm "$RUNNER_TEMP/cert.p12"
        id: import-cert

      - name: Sign binary
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        run: |
          codesign --sign "$CODESIGN_IDENTITY" --options runtime \
            target/${{ matrix.target }}/release/dodot
          codesign --verify --deep --strict target/${{ matrix.target }}/release/dodot

      # macOS notarization
      - name: Write App Store Connect API key
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then
            echo "::warning::No ASC API key configured, skipping notarization"
            exit 0
          fi
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Submit for notarization
        id: notarize-submit
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then exit 0; fi
          # notarytool needs a zip, dmg, or pkg
          cd target/${{ matrix.target }}/release
          zip dodot-notarize.zip dodot
          RESULT=$(xcrun notarytool submit dodot-notarize.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.ASC_API_KEY_ID }}" \
            --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
            --output-format json \
            --no-wait)
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "submission-id=$ID" >> "$GITHUB_OUTPUT"
          rm dodot-notarize.zip

      - name: Wait for notarization
        if: matrix.sign && steps.notarize-submit.outputs.submission-id
        run: |
          ID="${{ steps.notarize-submit.outputs.submission-id }}"
          for i in $(seq 1 60); do
            RESULT=$(xcrun notarytool info "$ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
              --output-format json 2>&1) || true
            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" \
              2>/dev/null || echo "Unknown")
            echo "  [$i/60] status=$STATUS ($(date -u +%H:%M:%S))"
            if [ "$STATUS" = "Accepted" ]; then exit 0; fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --key-id "${{ secrets.ASC_API_KEY_ID }}" \
                --issuer "${{ secrets.ASC_API_ISSUER_ID }}" 2>&1 || true
              exit 1
            fi
            sleep 30
          done
          echo "::warning::Notarization timed out after 30 min. Binary is signed but not notarized."

      - name: Package binary
        id: package
        if: always() && !cancelled() && steps.check_asset.outputs.exists != 'true' && steps.build.outcome == 'success'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dodot dist/dodot
          cd dist
          tar -czvf ../${{ matrix.artifact }}.tar.gz dodot

      - name: Upload to GitHub Release
        if: always() && !cancelled() && steps.package.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" "${{ matrix.artifact }}.tar.gz" --clobber

  publish-crates:
    needs: create-release
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Publish dodot-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cargo publish -p dodot-lib 2>&1 || {
            if cargo search dodot-lib --limit 1 2>/dev/null | grep -q "dodot-lib.*\"$VERSION\""; then
              echo "dodot-lib@$VERSION already published, skipping"
            else
              echo "Failed to publish dodot-lib"
              exit 1
            fi
          }

      - name: Wait for crates.io to index dodot-lib
        run: sleep 30

      - name: Publish dodot
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cargo publish -p dodot 2>&1 || {
            if cargo search dodot --limit 1 2>/dev/null | grep -q "dodot.*\"$VERSION\""; then
              echo "dodot@$VERSION already published, skipping"
            else
              echo "Failed to publish dodot"
              exit 1
            fi
          }
