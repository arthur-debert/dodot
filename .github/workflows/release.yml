name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.18.0 or 1.0.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # ─── Project-specific values for downstream jobs (e.g. homebrew-formula).
  # Mirrors the reusable env-block convention from padz's release.yml so
  # this workflow can be diff-ported to other cargo projects without
  # hunting for hard-coded names.
  BIN_NAME: dodot
  CRATE_NAME: dodot
  EXTRA_CRATES: "dodot-lib"
  # Homebrew tap repo (owner/repo). Empty/missing HOMEBREW_TAP_TOKEN
  # makes the homebrew-formula job skip cleanly, so this is safe to
  # keep even before the secret is configured.
  HOMEBREW_TAP: arthur-debert/homebrew-tools
  HOMEBREW_FORMULA: dodot
  # ─── Debian package gate ──────────────────────────────────────────────
  # Build .deb packages for linux targets and attach to the GitHub
  # Release. Set to "false" to skip. Requires `[package.metadata.deb]`
  # in the crate's Cargo.toml.
  ENABLE_DEB: "true"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release-sha: ${{ steps.bump.outputs.sha }}
      prerelease: ${{ steps.bump.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Validate and prepare
        id: bump
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH[-PRERELEASE] (got: $NEW_VERSION)"
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$NEW_VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          TAG="v$NEW_VERSION"
          CLI_TOML="crates/dodot-cli/Cargo.toml"
          LIB_TOML="crates/dodot-lib/Cargo.toml"
          CURRENT_VERSION=$(grep -E '^version = ' "$CLI_TOML" | head -1 | sed 's/version = "\(.*\)"/\1/')

          git fetch --tags origin >/dev/null 2>&1 || true

          # Resume case: tag already exists and its commit has Cargo.toml
          # at NEW_VERSION. Happens when a previous run committed+tagged+
          # published to crates.io but a downstream job (e.g. a binary
          # build) failed. Skip the bump so downstream jobs re-run against
          # the tagged commit (release-sha) and fill in what's missing.
          # Note: this does not require tag==HEAD, because follow-up CI
          # fixes may have advanced main past the tag.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            TAG_VERSION=$(git show "$TAG_SHA:$CLI_TOML" | grep -E '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$TAG_VERSION" = "$NEW_VERSION" ]; then
              echo "tag $TAG already exists at $TAG_SHA (Cargo.toml=$TAG_VERSION) — resuming release"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::tag $TAG exists but Cargo.toml at that commit is $TAG_VERSION, not $NEW_VERSION"
            exit 1
          fi

          OLD_VERSION="$CURRENT_VERSION"
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "::error::Cargo.toml is already at $NEW_VERSION (but no tag)"
            exit 1
          fi

          BODY=$(awk '/^### /{found=1} found{print}' CHANGELOG_UNRELEASED.md)
          if [ -z "$BODY" ]; then
            echo "::error::CHANGELOG_UNRELEASED.md has no entries"
            exit 1
          fi

          echo "Releasing $OLD_VERSION → $NEW_VERSION"

          sed -i -E "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" "$CLI_TOML" "$LIB_TOML"
          sed -i -E "s/^dodot-lib = \\{ version = \"$OLD_VERSION\"/dodot-lib = { version = \"$NEW_VERSION\"/" "$CLI_TOML"
          cargo update -p dodot -p dodot-lib

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$IS_PRERELEASE" = "true" ]; then
            # Pre-releases share the unreleased entries with the final they
            # lead up to: don't roll into CHANGELOG.md and don't clear
            # CHANGELOG_UNRELEASED.md. Subsequent rc.N / the final release
            # will see the same entries.
            git add "$CLI_TOML" "$LIB_TOML" Cargo.lock
            git commit -m "chore: Release $TAG"
          else
            TODAY=$(date -u +%Y-%m-%d)
            SECTION=$(mktemp)
            {
              printf '## [%s] - %s\n\n' "$NEW_VERSION" "$TODAY"
              printf '%s\n\n' "$BODY"
            } > "$SECTION"
            awk -v section_file="$SECTION" '
                !inserted && /^## \[/ {
                    while ((getline line < section_file) > 0) print line
                    close(section_file)
                    inserted=1
                }
                { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
            rm -f "$SECTION"

            cat > CHANGELOG_UNRELEASED.md <<'EOF'
          # Unreleased Changes

          Add entries here as changes are made. On release, copy this content into
          CHANGELOG.md under a new version heading and clear this file.

          The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
          Use **level-3** section headings (`### Added`, `### Changed`, `### Deprecated`,
          `### Removed`, `### Fixed`, `### Security`) so they nest cleanly under the
          `## [version]` heading the release workflow inserts.
          EOF

            git add "$CLI_TOML" "$LIB_TOML" Cargo.lock CHANGELOG.md CHANGELOG_UNRELEASED.md
            git commit -m "chore: Release $TAG"
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main
          git push origin "$TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            # Pre-releases haven't rolled into CHANGELOG.md — read the
            # still-uncleared unreleased entries instead.
            awk '/^### /{found=1} found{print}' CHANGELOG_UNRELEASED.md > release-notes.md
          else
            awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: v${{ needs.prepare-release.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    needs: [prepare-release, create-release]
    if: always() && !failure() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dodot-aarch64-apple-darwin
            cross: false
            sign: true
            deb_arch: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dodot-x86_64-linux-gnu
            cross: false
            sign: false
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dodot-aarch64-linux-gnu
            cross: true
            sign: false
            deb_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Check if asset already exists
        id: check_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare-release.outputs.version }}"
          ASSET="${{ matrix.artifact }}.tar.gz"
          if gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -q "^${ASSET}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Asset $ASSET already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust
        if: steps.check_asset.outputs.exists != 'true'
        uses: ./.github/actions/rust-setup
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross && steps.check_asset.outputs.exists != 'true'
        # Pinned to 0.2.5: cross's `:main` image has a glibc mismatch
        # with newer rustc that breaks build scripts (GLIBC_2.32+ not
        # found in container's libc). 0.2.5 ships its own compatible
        # `:0.2.5` image tags.
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary
        id: build
        if: steps.check_asset.outputs.exists != 'true'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p dodot
          else
            cargo build --release --target ${{ matrix.target }} -p dodot
          fi

      - name: Import signing certificate
        if: matrix.sign && steps.check_asset.outputs.exists != 'true'
        continue-on-error: true
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::warning::No signing certificate configured, skipping code signing"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm "$RUNNER_TEMP/cert.p12"
        id: import-cert

      - name: Sign binary
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        run: |
          codesign --sign "$CODESIGN_IDENTITY" --options runtime \
            target/${{ matrix.target }}/release/dodot
          codesign --verify --deep --strict target/${{ matrix.target }}/release/dodot

      - name: Write App Store Connect API key
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then
            echo "::warning::No ASC API key configured, skipping notarization"
            exit 0
          fi
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Submit for notarization
        id: notarize-submit
        if: matrix.sign && steps.check_asset.outputs.exists != 'true' && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then exit 0; fi
          cd target/${{ matrix.target }}/release
          zip dodot-notarize.zip dodot
          RESULT=$(xcrun notarytool submit dodot-notarize.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.ASC_API_KEY_ID }}" \
            --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
            --output-format json \
            --no-wait)
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "submission-id=$ID" >> "$GITHUB_OUTPUT"
          rm dodot-notarize.zip

      - name: Wait for notarization
        if: matrix.sign && steps.notarize-submit.outputs.submission-id
        run: |
          ID="${{ steps.notarize-submit.outputs.submission-id }}"
          # 120 polls × 30s = 60 min cap. Apple's queue usually returns
          # in under 5 min, but slow-queue days can stretch past 30 min
          # (observed in run 25177595282). 60 min absorbs that without
          # holding a runner forever.
          for i in $(seq 1 120); do
            RESULT=$(xcrun notarytool info "$ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
              --output-format json 2>&1) || true
            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" \
              2>/dev/null || echo "Unknown")
            echo "  [$i/120] status=$STATUS ($(date -u +%H:%M:%S))"
            if [ "$STATUS" = "Accepted" ]; then exit 0; fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --key-id "${{ secrets.ASC_API_KEY_ID }}" \
                --issuer "${{ secrets.ASC_API_ISSUER_ID }}" 2>&1 || true
              exit 1
            fi
            sleep 30
          done
          echo "::warning::Notarization timed out after 60 min — submission $ID still In Progress. Binary is signed but Apple has not confirmed notarization yet. Check status with: xcrun notarytool info $ID --key <p8> --key-id <id> --issuer <id>. The published binary will still pass Gatekeeper online checks once Apple finishes (online verification only — not stapled, since stapling a standalone Mach-O is not supported)."

      - name: Package binary
        id: package
        if: always() && !cancelled() && steps.check_asset.outputs.exists != 'true' && steps.build.outcome == 'success'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dodot dist/dodot
          cd dist
          tar -czvf ../${{ matrix.artifact }}.tar.gz dodot

      - name: Upload to GitHub Release
        if: always() && !cancelled() && steps.package.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare-release.outputs.version }}"
          gh release upload "$TAG" "${{ matrix.artifact }}.tar.gz" --clobber

      # Also upload as a workflow artifact so downstream jobs (currently
      # homebrew-formula) can sha256 the tarballs without re-downloading
      # them from the GH release.
      - name: Upload tarball as workflow artifact
        if: always() && !cancelled() && steps.package.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 7

      # ─── Debian package (linux targets only, gated on ENABLE_DEB) ────
      # cargo-deb reads [package.metadata.deb] from crates/dodot-cli/Cargo.toml.
      # `--no-build` reuses the release binary built above; `--no-strip`
      # leaves debug info as-is (matches the macOS/tarball binaries).
      - name: Install cargo-deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true' && steps.check_asset.outputs.exists != 'true' && steps.build.outcome == 'success'
        run: command -v cargo-deb >/dev/null 2>&1 || cargo install cargo-deb --locked

      - name: Build .deb package
        id: deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true' && steps.check_asset.outputs.exists != 'true' && steps.build.outcome == 'success'
        run: |
          # cargo-deb derives the Debian Architecture: field from --target
          # automatically — no --variant flag needed. The empty variants
          # declared in Cargo.toml are extensibility hooks for future per-arch
          # customization (e.g. arch-specific depends).
          cargo deb -p dodot \
            --target ${{ matrix.target }} \
            --no-build \
            --no-strip

      - name: Upload .deb to GitHub Release
        if: always() && !cancelled() && steps.deb.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare-release.outputs.version }}"
          DEB=$(ls target/${{ matrix.target }}/debian/*.deb | head -1)
          if [ -z "$DEB" ]; then
            echo "::error::No .deb found at target/${{ matrix.target }}/debian/"
            exit 1
          fi
          gh release upload "$TAG" "$DEB" --clobber

      - name: Upload .deb as workflow artifact
        if: always() && !cancelled() && steps.deb.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dodot-${{ matrix.deb_arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error
          retention-days: 7

  publish-crates:
    needs: [prepare-release, create-release]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      # Use scripts/ci-publish-crate.sh for the robust two-tier check:
      # 1. Pre-check via crates.io JSON API (skips re-publish entirely)
      # 2. Grep cargo's publish output for "already exists"/"already uploaded"
      #    Replaces the prior `cargo search ... | grep VERSION` heuristic,
      # which broke when re-publishing an older rc — `cargo search` only
      # returns the LATEST version, so the grep wouldn't match older ones.
      - name: Publish dodot-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: scripts/ci-publish-crate.sh dodot-lib

      - name: Wait for crates.io to index dodot-lib
        run: sleep 30

      - name: Publish dodot
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: scripts/ci-publish-crate.sh dodot

  homebrew-formula:
    # Generates a Homebrew formula from .github/homebrew-formula.rb.tmpl
    # using the per-target tarball SHAs and pushes it to the tap repo
    # (HOMEBREW_TAP). Skips cleanly when HOMEBREW_TAP_TOKEN isn't
    # configured, so this job is safe to keep even before the tap is
    # wired up. Mirrors the equivalent job in padz/release.yml — see
    # ~/h/repo-all/tooling.lex for the canonical-design rationale.
    needs: [prepare-release, build-binaries]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping formula update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for template + Cargo.toml)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Setup Rust (for cargo metadata)
        if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/rust-setup

      - name: Download release tarballs
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: Gather values for formula
        id: values
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail

          # Derive Ruby formula class name (PascalCase from HOMEBREW_FORMULA,
          # splitting on `-` and `_`). `dodot` → `Dodot`, `my-tool` → `MyTool`.
          CLASS_NAME=$(echo "$HOMEBREW_FORMULA" | awk -F'[-_]' '{
            for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) tolower(substr($i,2))
          }')

          # Pull metadata once, then extract + validate each field. Brew
          # rejects formulas with empty desc/homepage/license at audit
          # time, so fail loudly here with a pointer to the fix.
          PKG_META=$(cargo metadata --no-deps --format-version=1 \
            | jq -cer --arg c "$CRATE_NAME" '.packages[] | select(.name==$c)')
          DESC=$(echo     "$PKG_META" | jq -r '.description // ""')
          LICENSE=$(echo  "$PKG_META" | jq -r '.license // ""')
          HOMEPAGE=$(echo "$PKG_META" | jq -r '.homepage // .repository // ""')

          die_if_empty() {
            local name="$1" value="$2" fix="$3"
            if [ -z "$value" ]; then
              echo "::error::Missing $name for crate '$CRATE_NAME'. $fix"
              exit 1
            fi
          }
          die_if_empty description "$DESC"     "Set package.description in Cargo.toml."
          die_if_empty license     "$LICENSE"  "Set package.license in Cargo.toml."
          die_if_empty homepage    "$HOMEPAGE" "Set package.homepage or package.repository in Cargo.toml."

          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${BIN_NAME}"

          sha_for() { sha256sum "${BIN_NAME}-$1.tar.gz" | cut -d' ' -f1; }

          # dodot ships macOS arm64 only — no URL_X86_64_APPLE_DARWIN. The
          # template has no on_intel block under on_macos, and the render
          # script tolerates absent placeholder values (find_unsubstituted
          # would catch any leftover `{{...}}` in the rendered output).
          {
            echo "class_name=$CLASS_NAME"
            echo "desc=$DESC"
            echo "license=$LICENSE"
            echo "homepage=$HOMEPAGE"
            echo "url_aarch64_apple_darwin=${URL_BASE}-aarch64-apple-darwin.tar.gz"
            echo "url_x86_64_linux_gnu=${URL_BASE}-x86_64-linux-gnu.tar.gz"
            echo "url_aarch64_linux_gnu=${URL_BASE}-aarch64-linux-gnu.tar.gz"
            echo "sha_aarch64_apple_darwin=$(sha_for aarch64-apple-darwin)"
            echo "sha_x86_64_linux_gnu=$(sha_for     x86_64-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(sha_for    aarch64-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render Homebrew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION:                   ${{ needs.prepare-release.outputs.version }}
          CLASS_NAME:                ${{ steps.values.outputs.class_name }}
          DESC:                      ${{ steps.values.outputs.desc }}
          LICENSE:                   ${{ steps.values.outputs.license }}
          HOMEPAGE:                  ${{ steps.values.outputs.homepage }}
          URL_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.url_aarch64_apple_darwin }}
          URL_X86_64_LINUX_GNU:      ${{ steps.values.outputs.url_x86_64_linux_gnu }}
          URL_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.url_aarch64_linux_gnu }}
          SHA_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_LINUX_GNU:      ${{ steps.values.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.sha_aarch64_linux_gnu }}
        run: |
          set -euo pipefail
          mkdir -p out
          python3 .github/render-homebrew-formula.py \
            .github/homebrew-formula.rb.tmpl \
            "out/${HOMEBREW_FORMULA}.rb"

          echo "=== Generated formula ==="
          cat "out/${HOMEBREW_FORMULA}.rb"

      - name: Ruby syntax check
        if: steps.guard.outputs.skip != 'true'
        run: ruby -c "out/${HOMEBREW_FORMULA}.rb"

      - name: Checkout tap repo
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${HOMEBREW_FORMULA}.rb" "tap/Formula/${HOMEBREW_FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "${HOMEBREW_FORMULA} ${VERSION}"
          git push
