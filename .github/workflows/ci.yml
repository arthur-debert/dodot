name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          rust-components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run checks
        run: scripts/check

      - name: Build release binary
        run: cargo build --release -p dodot

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dodot-linux
          path: target/release/dodot

  e2e:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tests
        uses: actions/checkout@v6
        with:
          sparse-checkout: tests/e2e

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: dodot-linux

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run E2E tests
        run: |
          chmod +x dodot
          export DODOT_BIN="$PWD/dodot"
          bats tests/e2e/bats/
